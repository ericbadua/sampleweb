<style>/* Root variables */

/* Smooth transition for dark/light mode */
:root,:root[data-theme="dark"] {
  transition: background-color 0.25s ease-out, color 0.25s ease-out;
}
:root {
  --gap:24px;
  --content-gap:20px;
  --nav-width:1024px;
  --main-width:720px;
  --header-height:60px;
  --footer-height:60px;
  --radius:8px;
  --theme:#f5f5f5;
  --entry:rgb(255, 255, 255);
  --primary:rgb(30, 30, 30);
  --secondary:rgb(108, 108, 108);
  --tertiary:rgb(214, 214, 214);
  --content:rgb(31, 31, 31);
  --code-block-bg:rgb(28, 29, 33);
  --code-bg:rgb(245, 245, 245);
  --border:rgb(238, 238, 238);
  color-scheme:light;
}

:root[data-theme=dark] {
  --theme:rgb(29, 30, 32);
  --entry:rgb(46, 46, 51);
  --primary:rgb(218, 218, 219);
  --secondary:rgb(155, 156, 157);
  --tertiary:rgb(65, 66, 68);
  --content:rgb(196, 196, 197);
  --code-block-bg:rgb(46, 46, 51);
  --code-bg:rgb(55, 56, 62);
  --border:rgb(51, 51, 51);
  color-scheme:dark;
}

/* Global elements */
*, ::after, ::before{
  box-sizing: border-box;
  margin: 0;  padding: 0;}


  html {
  -webkit-tap-highlight-color:transparent;
  overflow-y:scroll;
  -webkit-text-size-adjust:100%;
  text-size-adjust:100%}

 
body {
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, open sans, helvetica neue, sans-serif;
  font-size:18px;
  line-height:1.6;
  word-break:break-word;
  background:var(--theme);
  color: var(--primary);
  margin:0; 
  transition: background 0.3s ease, color 0.3s ease;
}



header, nav{  display:block;
  transition: background 0.3s ease, color 0.3s ease;}


article,
aside,
figcaption,
figure,
footer,
header,
hgroup,
main,
nav,
section,
table {
  display:block;
}

h1,
h2,
h3,
h4,
h5,
h6 {
  line-height:1.2;
  margin-top:0;
  margin-bottom:0;
}

p {
  margin-top:0;
  margin-bottom:0;
}

ul {
  padding:0;
  margin:0;
}


button,
input,
textarea {
  padding:0;
  font:inherit;
  background:0 0;
  border:0;
}

input,
textarea {
  outline:0;
}

button,
input[type=button],
input[type=submit] {
  cursor:pointer;
}

input:-webkit-autofill,
textarea:-webkit-autofill {
  box-shadow:0 0 0 50px var(--theme) inset;
}

img {  display:block;
  max-width:100%;}



a {  text-decoration:none;
  color:var(--primary);}



.container {
  max-width: var(--nav-width);
  margin: 0 auto;
  padding: 0 var(--gap);
}



/* ================= HEADER ================= */

.header {
  position: relative;
  top: 0;
  backdrop-filter: blur(10px);
  background: var(--theme);
  border-bottom: 1px solid rgba(0,0,0,0.05);
  z-index: 1000;

}

[data-theme="dark"] .header {
  background: var(--theme);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: var(--header-height);
  background: var(--theme);
}

/* LOGO */

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo a {
  font-size: 26px;
  font-weight: 700;
  color: var(--primary);
}

.logo a,
.logo a img,
.logo a svg {
  display:inline;
  vertical-align:middle;
  transform:translate(0,-10%);
  border-radius:6px;
  margin-inline-end:8px
}

.logo a img,
.logo a svg {
  pointer-events:none;
}

/* MENU */

.menu {
  display: flex;
  gap: var(--gap);
  list-style: none;
  align-items: center;
  background: var(--theme);
  transition: all 0.3s ease;
}

.menu a {
  text-decoration: none;
  color: var(--primary);
  font-weight: 500;
  position: relative;
  padding: 4px 0;
}

/* underline animation */
.menu a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -3px;
  width: 0%;
  height: 2px;
  background: var(--primary);
  transition: width 0.3s ease;
}

.menu a:hover::after {
  width: 100%;
}

a:hover {
  opacity: 0.8;
}

.menu ul{
  background: var(--theme);
}

/* THEME BUTTON */

#theme-toggle {
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
  color: var(--primary);
}

#sun-icon {
  display: none;
}

[data-theme="dark"] #moon-icon {
  display: none;
}

[data-theme="dark"] #sun-icon {
  display: inline;
}





.main {
  position:relative;
  min-height:calc(100vh - var(--header-height) - var(--footer-height));
  max-width:calc(var(--main-width) + var(--gap) * 2);
  margin:auto;
  padding:var(--gap)
}






/* ================= FIRST ENTRY ================= */
.first-entry {
  position:relative;
  display:flex;
  flex-direction:column;
  justify-content:center;
  min-height:320px;
  margin:var(--gap)0 calc(var(--gap) * 2)
}
.first-entry .entry-header {
  overflow:hidden;
  display:-webkit-box;
  -webkit-box-orient:vertical;
  -webkit-line-clamp:3
}
.first-entry .entry-header h1 {
  font-size:34px;
  line-height:1.3}

.entry-header h2 {
  font-size:24px;
  line-height:1.3}

.first-entry .entry-content {
  margin:14px 0;
  font-size:16px;
  -webkit-line-clamp:3}


.home-info .entry-content {
  -webkit-line-clamp:unset}

.home-info ul {
  padding-inline-start:20px}

.entry-content {
  margin:8px 0;
  color:var(--secondary);
  font-size:14px;
  line-height:1.6;
  overflow:hidden;
  display:-webkit-box;
  -webkit-box-orient:vertical;
  -webkit-line-clamp:2}



/* ================= ENTRY FOOTER ================= */

.first-entry .entry-footer {
  font-size:14px;
}

.entry-footer {
  color:var(--secondary);
  font-size:13px;
}


.social-icons a {
  display:inline-flex;
  padding:10px
}
.social-icons a svg {
  height:26px;
  width:26px}


/* ================= POST ENTRY ================= */
  .post-entry {
  position:relative;
  margin-bottom:var(--gap);
  padding:var(--gap);
  background:var(--entry);
  border-radius:var(--radius);
  transition:transform .1s;
  border:1px solid var(--border)
}
.post-entry:active {
  transform:scale(.96)
}

.entry-link {
  position:absolute;
  left:0;
  right:0;
  top:0;
  bottom:0
}
.entry-hint {
  color:var(--secondary)
}
.entry-hint-parent {
  display:flex;
  justify-content:space-between
}




.pagination {
  display:flex
}
.pagination a {
  color:var(--theme);
  font-size:13px;
  line-height:36px;
  background:var(--primary);
  border-radius:calc(36px/2);
  padding:0 16px
}
.pagination .next {
  margin-inline-start:auto
}

/* ================= 2nd page ENTRY ================= */

.entry-cover {
  font-size:14px;
  margin-bottom:var(--gap);
  text-align:center
}
.entry-cover img {
  border-radius:var(--radius);
  width:100%;
  height:auto
}
.entry-cover a {
  box-shadow:0 1px 0 var(--primary)
}




/* ================= archive ================= */


.page-header h1 {
  font-size:40px
}

.page-header,
.post-header {
  margin:24px auto var(--content-gap)
}


.archive-posts {
  width:100%;
  font-size:16px
}
.archive-year {
  margin-top:40px
}
.archive-year:not(:last-of-type) {
  border-bottom:2px solid var(--border)
}
.archive-month {
  display:flex;
  align-items:flex-start;
  padding:10px 0
}
.archive-month-header {
  margin:25px 0;
  width:200px
}
.archive-month:not(:last-of-type) {
  border-bottom:1px solid var(--border)
}
.archive-entry {
  position:relative;
  padding:5px;
  margin:10px 0
}
.archive-entry-title {
  margin:5px 0;
  font-weight:400
}
.archive-count,
.archive-meta {
  color:var(--secondary);
  font-size:14px
}









/* ================= ARTICLE ================= */


  .post-title {
  margin-bottom:2px;
  font-size:40px
}
.post-description {
  margin-top:10px;
  margin-bottom:5px
}

.post-meta,
.breadcrumbs {
  color:var(--secondary);
  font-size:14px
}
.breadcrumbs {
  display:flex;
  flex-wrap:wrap;
  align-items:center
}
.i18n_list {
  display:inline-flex
}
.post-meta .i18n_list li {
  list-style:none;
  margin:auto 3px
}
.breadcrumbs a {
  font-size:16px}





.post-content {
  color:var(--content);
  margin:30px 0
}
.post-content h3,
.post-content h4,
.post-content h5,
.post-content h6 {
  margin:24px 0 16px
}
.post-content h1 {
  margin:40px auto 32px;
  font-size:40px
}
.post-content h2 {
  margin:32px auto 24px;
  font-size:32px
}
.post-content h3 {
  font-size:24px
}
.post-content h4 {
  font-size:16px
}
.post-content h5 {
  font-size:14px
}
.post-content h6 {
  font-size:12px
}
.post-content a,
.post-meta .i18n_list li a,
.toc a:hover {
  box-shadow:0 1px;
  box-decoration-break:clone;
  -webkit-box-decoration-break:clone
}
.post-content a code {
  margin:auto 0;
  border-radius:0;
  box-shadow:0 -1px 0 var(--primary)inset
}
.post-content del {
  text-decoration:line-through
}
.post-content dl,
.post-content ol,
.post-content p,
.post-content figure,
.post-content ul {
  margin-bottom:var(--content-gap)
}
.post-content ol,
.post-content ul {
  padding-inline-start:20px
}
.post-content li {
  margin-top:5px
}
.post-content li p {
  margin-bottom:0
}
.post-content dl {
  display:flex;
  flex-wrap:wrap;
  margin:0
}
.post-content dt {
  width:25%;
  font-weight:700
}
.post-content dd {
  width:75%;
  margin-inline-start:0;
  padding-inline-start:10px
}
.post-content dd~dd,
.post-content dt~dt {
  margin-top:10px
}
.post-content table {
  margin-bottom:var(--content-gap)
}
.post-content table th,
.post-content table:not(.highlighttable,
.highlight table,
.gist .highlight) td {
  min-width:80px;
  padding:8px 5px;
  line-height:1.5;
  border-bottom:1px solid var(--border)
}
.post-content table th {
  text-align:start
}
.post-content table:not(.highlighttable) td code:only-child {
  margin:auto 0
}
.post-content .highlight table {
  border-radius:var(--radius)
}
.post-content .highlight:not(table) {
  margin:10px auto;
  background:var(--code-block-bg)!important;
  border-radius:var(--radius);
  direction:ltr
}
.post-content li>.highlight {
  margin-inline-end:0
}
.post-content ul pre {
  margin-inline-start:calc(var(--gap) * -2)
}
.post-content .highlight pre {
  margin:0
}
.post-content .highlighttable {
  table-layout:fixed
}
.post-content .highlighttable td:first-child {
  width:40px
}
.post-content .highlighttable td .linenodiv {
  padding-inline-end:0!important
}
.post-content .highlighttable td .highlight,
.post-content .highlighttable td .linenodiv pre {
  margin-bottom:0
}
.post-content code {
  margin:auto 4px;
  padding:4px 6px;
  font-size:.78em;
  line-height:1.5;
  background:var(--code-bg);
  border-radius:2px
}
.post-content pre code {
  display:grid;
  margin:auto 0;
  padding:10px;
  color:#d5d5d6;
  background:var(--code-block-bg)!important;
  border-radius:var(--radius);
  overflow-x:auto;
  word-break:break-all
}
.post-content blockquote {
  margin:20px 0;
  padding:0 14px;
  border-inline-start:3px solid var(--primary)
}
.post-content hr {
  margin:30px 0;
  height:2px;
  background:var(--tertiary);
  border:0
}
.post-content iframe {
  max-width:100%
}
.post-content img {
  border-radius:4px;
  margin:1rem 0
}
.post-content img[src*="#center"] {
  margin:1rem auto
}
.post-content figure.align-center {
  text-align:center
}
.post-content figure>figcaption {
  color:var(--primary);
  font-size:16px;
  font-weight:700;
  margin:8px 0 16px
}
.post-content figure>figcaption>p {
  color:var(--secondary);
  font-size:14px;
  font-weight:400
}
.toc {
  margin-bottom:var(--content-gap);
  border:1px solid var(--border);
  background:var(--code-bg);
  border-radius:var(--radius);
  padding:.4em;
  transition: background 0.25s ease, color 0.25s ease;
}
[data-theme=dark] .toc {
  background:var(--entry)
}
.toc details summary {
  cursor:zoom-in;
  margin-inline-start:10px;
  user-select:none
}
.toc details[open] summary {
  cursor:zoom-out
}
.toc .details {
  display:inline;
  font-weight:500
}
.toc .inner {
  margin:5px 20px;
  padding:0 10px;
  opacity:.9
}
.toc li ul {
  margin-inline-start:var(--gap)
}
.toc summary:focus {
  outline:0
}
.post-footer {
  margin-top:var(--content-gap)
}
.post-footer>* {
  margin-bottom:10px
}


h1:hover .anchor,
h2:hover .anchor,
h3:hover .anchor,
h4:hover .anchor,
h5:hover .anchor,
h6:hover .anchor {
  display:inline-flex;
  color:var(--secondary);
  margin-inline-start:8px;
  font-weight:500;
  user-select:none
}




.share-buttons,
.paginav {
  border-radius:var(--radius);
  background:var(--code-bg);
  border:1px solid var(--border)
}




.post-footer {
  margin-top:var(--content-gap)
}
.post-footer>* {
  margin-bottom:10px
}
.post-tags {
  display:flex;
  flex-wrap:wrap;
  gap:10px
}
.post-tags li {
  display:inline-block
}
.post-tags a,
.share-buttons,
.paginav {
  border-radius:var(--radius);
  background:var(--code-bg);
  border:1px solid var(--border)
}
.post-tags a {
  display:block;
  padding:0 14px;
  color:var(--secondary);
  font-size:14px;
  line-height:34px;
  background:var(--code-bg)
}
.post-tags a:hover,
.paginav a:hover {
  background:var(--border)
}
.share-buttons {
  padding:10px;
  display:flex;
  justify-content:center;
  overflow-x:auto;
  gap:10px
}
.share-buttons li,
.share-buttons a {
  display:inline-flex
}
.share-buttons a:not(:last-of-type) {
  margin-inline-end:12px
}


.highlight  code{
  background: none;
  color: var(--secondary);
}













/* HAMBURGER */

.hamburger {
  display: none;
  width: 28px;
  height: 20px;
  cursor: pointer;
  flex-direction: column;
  justify-content: space-between;
}

.hamburger .bar {
  width: 100%;
  height: 2px;
  background: var(--primary);
  transition: all 0.3s ease;
}

/* animation when active */

.hamburger.active .bar:nth-child(1) {
  transform: translateY(9px) rotate(45deg);
}

.hamburger.active .bar:nth-child(2) {
  opacity: 0;
}

.hamburger.active .bar:nth-child(3) {
  transform: translateY(-9px) rotate(-45deg);
}








/* ================= MOBILE ================= */

@media (max-width: 768px) {
  .menu {    position: absolute;
    top: var(--header-height);
    right: 0;
    background: var(--entry);   /* solid background */
    flex-direction: column;
    width: 220px;
    padding: 20px;
    transform: translateX(100%);
    transition: transform 0.3s ease;

    border-left: 1px solid var(--border);
    box-shadow: -10px 0 25px rgba(0,0,0,0.08);
    backdrop-filter: none; /* prevents transparency look */
   }

  .menu.active {    transform: translateX(0);  }

  .hamburger {    display: flex;  }
}









.footer {
        display: block;
      font-size:12px;
  color:var(--secondary);
  max-width:calc(var(--main-width) + var(--gap) * 2);
  margin:auto;
  padding:calc((var(--footer-height) - var(--gap))/2)var(--gap);
  text-align:center;
  line-height:24px
}
.footer span {
  margin-inline-start:1px;
  margin-inline-end:1px
}
.footer span:last-child {
  white-space:nowrap
}
.footer a {
  color:inherit;
  border-bottom:1px solid var(--secondary)
}
.footer a:hover {
  border-bottom:1px solid var(--primary)
}




</style>
